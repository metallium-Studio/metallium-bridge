name: Build Metallium Bridge

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Ce workflow est un TEMPLATE — à copier dans le repo metallium-bridge.
# Il construit le Bridge, crée la GitHub Release, et notifie metallium.app
# pour mettre à jour automatiquement la table app_releases en base.

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package (Windows)
        run: npx electron-builder --win --publish never

      - name: Get version & file info
        id: info
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          EXE=$(ls release/*.exe | head -1)
          echo "EXE=$EXE" >> $GITHUB_ENV
          FILE_SIZE=$(stat -c%s "$EXE" 2>/dev/null || stat -f%z "$EXE")
          echo "FILE_SIZE=$FILE_SIZE" >> $GITHUB_ENV

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="v${{ env.VERSION }}"
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" \
            --title "Metallium Bridge ${TAG}" \
            --notes "Metallium Bridge ${TAG}" \
            release/*.exe \
            release/latest.yml \
            release/*.blockmap

      - name: Notify metallium.app (update app_releases DB)
        shell: bash
        env:
          RELEASES_WEBHOOK_SECRET: ${{ secrets.RELEASES_WEBHOOK_SECRET }}
        run: |
          TAG="v${{ env.VERSION }}"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/$(basename ${{ env.EXE }})"
          curl -fsSL -X POST https://metallium.app/api/webhooks/app-release \
            -H "Content-Type: application/json" \
            -H "x-webhook-secret: ${RELEASES_WEBHOOK_SECRET}" \
            -d "{\"app_key\":\"bridge\",\"version\":\"${{ env.VERSION }}\",\"download_url\":\"${DOWNLOAD_URL}\",\"file_size\":${{ env.FILE_SIZE }}}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: metallium-bridge-win
          path: |
            release/*.exe
            release/latest.yml
